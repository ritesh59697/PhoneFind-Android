name: Build and Release Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create Dummy google-services.json for CI Build
        run: |
          if [ ! -f app/google-services.json ]; then
            echo '{"project_info":{"project_number":"123456789","project_id":"phonefind-app","storage_bucket":"phonefind.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:abcdef","android_client_info":{"package_name":"com.ritesh.phonefind"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyDemoKeyForCIBuild"}]}]}' > app/google-services.json
          fi

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhoneFind-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: ${{ github.ref_name }}
          name: PhoneFind Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
